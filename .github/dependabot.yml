# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    groups:
      github-actions:
        patterns:
          - "*"
    schedule:
      interval: monthly
    cooldown:
      default-days: 45
  - package-ecosystem: "docker"
    directory: "/src/cache"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 45
  - package-ecosystem: "gomod"
    directory: "/src/cache"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 45
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 45
