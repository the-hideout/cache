name: test

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'src/cache/go.mod'

      - name: bootstrap
        run: script/bootstrap
    
      - name: test
        run: script/test
