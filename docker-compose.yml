# To build the entire stack run 'make run'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "5"

services:
  redis:
    container_name: redis
    image: redis:alpine3.16@sha256:2700d5097763fda285c463f4eefc3d0730a2df2a9d48e66707b19d5a5e5f23d4
    restart: unless-stopped
    logging: *default-logging
    command:
      [
        "redis-server",
        "--maxmemory",
        "1gb",
        "--maxmemory-policy",
        "allkeys-lru"
      ]
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]

  cache:
    container_name: cache
    restart: unless-stopped
    logging: *default-logging
    build:
      context: ./src/cache
      dockerfile: ./Dockerfile
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-cache@local}
      SENTRY_TRACE_RATE: ${SENTRY_TRACE_RATE:-1.0}
    depends_on:
      - redis
